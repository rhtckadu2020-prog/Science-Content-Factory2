name: E-Learning Bot Generator

on:
  push:
    paths:
      - 'input/**'  # Input ෆෝල්ඩරයට යමක් දැම්මොත් විතරක් රන් කරන්න
  workflow_dispatch: # Button එක ඔබලත් රන් කරන්න පුළුවන්

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Output එක ආපහු Save කරන්න අවසර දීම

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Content Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/index.js

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add output/*
          git commit -m "🚀 Generated Content for Lesson" || echo "No changes to commit"
          git push
