name: 🏭 Content Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'input/Grade10_Lesson1.pdf'

jobs:
  generate-content:
    name: Generate E-Learning Content
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🤖 Generate Content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/index.js

      - name: 📤 Save Output to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Content Factory Bot"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 Auto-generated: $(date +'%Y-%m-%d %H:%M')"
          git push
